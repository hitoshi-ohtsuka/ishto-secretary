<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イシュト秘書 Ver.2</title>
<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.form{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input,select,button{
    padding:8px;
    margin:5px;
}

button{
    background:#007AFF;
    color:white;
    border:none;
    border-radius:5px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day{
    background:white;
    min-height:80px;
    border-radius:8px;
    padding:5px;
    border:1px solid #ddd;
}

.soccer{
    background:#2e7d32;
    color:white;
    border-radius:4px;
    padding:2px;
    margin-top:2px;
}

.school{
    background:#1565c0;
    color:white;
    border-radius:4px;
    padding:2px;
    margin-top:2px;
}

.private{
    background:#7b1fa2;
    color:white;
    border-radius:4px;
    padding:2px;
    margin-top:2px;
}
</style>
</head>
<body>
<h1>イシュト秘書 Ver.2</h1>
<div class="form">
    <input type="date" id="date">
<select id="category">
    <option value="soccer">サッカー協会</option>
    <option value="school">学校</option>
    <option value="private">private</option>
</select>

<input type="text" id="title" placeholder="予定内容">

<button onclick="addEvent()">追加</button>
</div>
<div id="calendar" class="calendar"></div>
<script>

const calendar=document.getElementById("calendar");

for(let i=1;i<=35;i++){
    const d=document.createElement("div");
    d.className="day";
    d.id="day"+i;
    d.innerHTML="<strong>"+i+"</strong>";
    calendar.appendChild(d);
}

function addEvent(){

    const date=document.getElementById("date").value;
    const title=document.getElementById("title").value;
    const category=document.getElementById("category").value;

    if(!date || !title){
        alert("日付と予定を入力してください");
        return;
    }

    const day=parseInt(date.split("-")[2]);

    const target=document.getElementById("day"+day);

    if(target){
        const event=document.createElement("div");
        event.className=category;
        event.textContent=title;
        target.appendChild(event);
    }

    alert("予定を追加しました");
}

</script>
</body>
</html>
