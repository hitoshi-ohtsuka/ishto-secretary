<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schedule App</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:1000px;margin:auto;padding:12px}
input,select,button{padding:8px;margin:4px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;width:14.2%;height:90px;vertical-align:top;padding:4px}
.event{color:white;border-radius:6px;padding:2px 4px;margin:2px 0;font-size:12px}
.soccer{background:#2e7d32}
.school{background:#1565c0}
.private{background:#6a1b9a}
</style>
</head>
<body>
<h1>イシュト専用カレンダー</h1>

<input type="month" id="month">
<br>
<input type="date" id="date">
<select id="cat">
<option value="soccer">サッカー協会</option>
<option value="school">学校</option>
<option value="private">private</option>
</select>
<input type="text" id="title" placeholder="予定">
<button onclick="addEvent()">追加</button>

<table>
<thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead>
<tbody id="cal"></tbody>
</table>

<script>
let events=JSON.parse(localStorage.getItem("isht_v3")||"[]");

function save(){
 localStorage.setItem("isht_v3",JSON.stringify(events));
 render();
}

function addEvent(){
 events.push({
   date:document.getElementById('date').value,
   cat:document.getElementById('cat').value,
   title:document.getElementById('title').value
 });
 save();
}

function render(){
 let m=document.getElementById('month').value;
 if(!m)return;
 let [y,mo]=m.split('-').map(Number);
 let first=new Date(y,mo-1,1);
 let last=new Date(y,mo,0);
 let day=1,start=first.getDay();
 let h='';
 for(let r=0;r<6;r++){
   h+='<tr>';
   for(let c=0;c<7;c++){
     if((r===0&&c<start)||day>last.getDate()){h+='<td></td>';}
     else{
       let ds=`${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
       let ev=events.filter(e=>e.date===ds)
          .map(e=>`<div class="event ${e.cat}">${e.title}</div>`).join('');
       h+=`<td><b>${day}</b>${ev}</td>`;
       day++;
     }
   }
   h+='</tr>';
 }
 document.getElementById('cal').innerHTML=h;
}

let n=new Date();
document.getElementById('month').value=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
document.getElementById('month').onchange=render;
render();
</script>
</body>
</html>
